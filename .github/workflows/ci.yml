name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate test data
        run: |
          python scripts/generate_test_csv.py

      - name: Validate training module import
        run: |
          python -c "from pipeline.train import train_model; print('train import ok')"

      - name: Validate API module import
        run: |
          python -c "from app.main import app; print(app.title)"

      - name: Build docker image
        run: |
          docker build -t warehouse-mlops:latest .
