name: deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_DIR: infra/terraform/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible and required collections
        run: |
          pip install ansible-core==2.15.11
          ansible-galaxy collection install community.general

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          # Decode base64 private key
          echo "${{ secrets.SSH_PRIVATE_KEY_BASE64 }}" | base64 -d > ~/.ssh/warehouse_mlops_new_id_rsa
          chmod 600 ~/.ssh/warehouse_mlops_new_id_rsa
          
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/warehouse_mlops_new_id_rsa.pub
          chmod 644 ~/.ssh/warehouse_mlops_new_id_rsa.pub
          
          cat > ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/warehouse_mlops_new_id_rsa
            IdentitiesOnly yes
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config
          
          ssh-keygen -y -f ~/.ssh/warehouse_mlops_new_id_rsa > /dev/null 2>&1 && echo "SSH key is valid" || echo "SSH key is INVALID"

      - name: Terraform tfvars
        run: |
          cat > $TF_DIR/terraform.tfvars <<EOF
          yc_token      = "${{ secrets.YC_TOKEN }}"
          yc_cloud_id   = "${{ secrets.YC_CLOUD_ID }}"
          yc_folder_id  = "${{ secrets.YC_FOLDER_ID }}"
          zone          = "ru-central1-a"
          ssh_public_key = "${{ secrets.SSH_PUBLIC_KEY }}"
          EOF

      - name: Terraform Init
        run: |
          cd $TF_DIR
          terraform init

      - name: Terraform Apply
        run: |
          cd $TF_DIR
          terraform apply -auto-approve

      - name: Get VM IP
        id: vm-ip
        run: |
          IP=$(cd $TF_DIR && terraform output -raw vm_external_ip)
          echo "VM_IP=$IP" >> $GITHUB_OUTPUT
          echo "VM IP: $IP"

      - name: Wait for SSH
        run: |
          IP="${{ steps.vm-ip.outputs.VM_IP }}"
          echo "Waiting for SSH on $IP..."
          for i in {1..30}; do
            if ssh -i ~/.ssh/warehouse_mlops_new_id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@$IP 'echo SSH OK'; then
              echo "SSH connection successful"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done
          echo "SSH connection failed after 30 attempts"
          exit 1

      - name: Create Ansible inventory
        run: |
          mkdir -p infra/ansible/inventory/production
          cat > infra/ansible/inventory/production/hosts.ini <<EOF
          [mlops]
          ${{ steps.vm-ip.outputs.VM_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=/home/runner/.ssh/warehouse_mlops_new_id_rsa
          EOF
          cat infra/ansible/inventory/production/hosts.ini

      - name: Ansible Deploy
        run: |
          ansible-playbook -i infra/ansible/inventory/production/hosts.ini infra/ansible/playbooks/deploy.yml

      - name: Check health
        run: |
          IP="${{ steps.vm-ip.outputs.VM_IP }}"
          echo "Checking health endpoint..."
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://$IP/health || true)
            if [ "$code" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - status: $code"
            sleep 10
          done
          exit 1

      - name: Terraform Destroy
        if: always()
        run: |
          cd $TF_DIR
          terraform destroy -auto-approve
