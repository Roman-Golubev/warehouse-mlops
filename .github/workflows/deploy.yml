name: deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_DIR: infra/terraform/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible rsync openssh-client

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/warehouse_mlops_new_id_rsa
          chmod 600 ~/.ssh/warehouse_mlops_new_id_rsa
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/warehouse_mlops_new_id_rsa.pub
          chmod 644 ~/.ssh/warehouse_mlops_new_id_rsa.pub

      - name: Terraform tfvars
        run: |
          cat > $TF_DIR/terraform.tfvars <<EOF
          yc_token      = "${{ secrets.YC_TOKEN }}"
          yc_cloud_id   = "${{ secrets.YC_CLOUD_ID }}"
          yc_folder_id  = "${{ secrets.YC_FOLDER_ID }}"
          zone          = "ru-central1-a"
          ssh_public_key = "${{ secrets.SSH_PUBLIC_KEY }}"
          EOF

      - name: Terraform Init
        run: |
          cd $TF_DIR
          terraform init

      - name: Terraform Apply
        run: |
          cd $TF_DIR
          terraform apply -auto-approve

      - name: Show inventory
        run: |
          cat infra/ansible/inventory/production/hosts.ini

      - name: Wait for SSH
        run: |
          IP=$(cd $TF_DIR && terraform output -raw vm_external_ip)
          for i in {1..30}; do
            if ssh -i ~/.ssh/warehouse_mlops_new_id_rsa -o StrictHostKeyChecking=no ubuntu@$IP 'echo ok'; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Ansible Deploy
        run: |
          ansible-playbook -i infra/ansible/inventory/production/hosts.ini infra/ansible/playbooks/deploy.yml

      - name: Check health
        run: |
          IP=$(cd $TF_DIR && terraform output -raw vm_external_ip)
          curl -i http://$IP/health

      - name: Terraform Destroy
        if: always()
        run: |
          cd $TF_DIR
          terraform destroy -auto-approve
